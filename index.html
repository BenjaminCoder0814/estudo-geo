<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
<meta name="theme-color" content="#0d0820" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Prova de Geografia · Levi Maciel · Revisão AV2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== CENÁRIO FUTURISTA ===== -->
  <div class="space-bg">
    <div class="stars"></div>
    <div class="stars stars2"></div>
    <div class="stars stars3"></div>
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
    <div class="nebula nebula-3"></div>

    <!-- Sol africano gigante -->
    <div class="sun">
      <div class="sun-core"></div>
      <div class="sun-ring"></div>
      <div class="sun-ring sun-ring-2"></div>
    </div>

    <!-- Planeta África girando -->
    <div class="planet planet-africa">
      <svg viewBox="0 0 200 200" class="planet-svg">
        <defs>
          <radialGradient id="gAfrica" cx="35%" cy="30%">
            <stop offset="0%" stop-color="#7ad7a8"/>
            <stop offset="60%" stop-color="#1f7a4a"/>
            <stop offset="100%" stop-color="#0a2e1c"/>
          </radialGradient>
          <radialGradient id="gAtm" cx="50%" cy="50%">
            <stop offset="80%" stop-color="rgba(122,215,168,0)"/>
            <stop offset="100%" stop-color="rgba(122,215,168,.45)"/>
          </radialGradient>
        </defs>
        <circle cx="100" cy="100" r="92" fill="url(#gAfrica)"/>
        <path d="M105,32 C128,38 142,55 138,78 C148,90 152,108 142,124 C140,142 128,160 110,168 C95,176 80,170 78,154 C66,148 62,132 70,120 C62,108 64,92 76,86 C72,72 80,58 92,52 C92,40 96,32 105,32 Z"
              fill="#f4c47b" opacity=".85"/>
        <circle cx="100" cy="100" r="98" fill="url(#gAtm)"/>
      </svg>
    </div>

    <!-- Planeta orbital pequeno -->
    <div class="planet planet-small">
      <svg viewBox="0 0 100 100" class="planet-svg">
        <defs>
          <radialGradient id="gMini" cx="35%" cy="35%">
            <stop offset="0%" stop-color="#ffd27a"/>
            <stop offset="100%" stop-color="#9c4b15"/>
          </radialGradient>
        </defs>
        <circle cx="50" cy="50" r="46" fill="url(#gMini)"/>
        <ellipse cx="50" cy="50" rx="70" ry="10" fill="none" stroke="#f6c238" stroke-width="2" opacity=".6"/>
      </svg>
    </div>

    <!-- Silhueta do baobá / savana no rodapé -->
    <svg class="savanna" viewBox="0 0 1600 200" preserveAspectRatio="none">
      <defs>
        <linearGradient id="gSavanna" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#1a0c20"/>
          <stop offset="100%" stop-color="#000"/>
        </linearGradient>
      </defs>
      <path d="M0,200 L0,140 Q100,120 180,135 T360,130 T520,138 T700,128 T880,140 T1060,125 T1240,138 T1420,130 T1600,140 L1600,200 Z" fill="url(#gSavanna)"/>
      <g transform="translate(180,140)" fill="#0a0510">
        <rect x="-8" y="-50" width="16" height="50"/>
        <ellipse cx="0" cy="-55" rx="38" ry="18"/>
        <ellipse cx="-22" cy="-62" rx="18" ry="10"/>
        <ellipse cx="20" cy="-60" rx="20" ry="11"/>
      </g>
      <g transform="translate(820,138)" fill="#0a0510">
        <rect x="-3" y="-55" width="6" height="55"/>
        <path d="M-40,-55 Q0,-80 40,-55 Z"/>
      </g>
      <g transform="translate(1300,140)" fill="#0a0510">
        <rect x="-7" y="-45" width="14" height="45"/>
        <ellipse cx="0" cy="-50" rx="32" ry="14"/>
        <ellipse cx="-18" cy="-55" rx="14" ry="8"/>
        <ellipse cx="18" cy="-55" rx="15" ry="9"/>
      </g>
    </svg>

    <!-- Símbolos Adinkra flutuantes -->
    <div class="adinkra adinkra-1">✦</div>
    <div class="adinkra adinkra-2">◈</div>
    <div class="adinkra adinkra-3">❂</div>
    <div class="adinkra adinkra-4">✺</div>
    <div class="adinkra adinkra-5">◉</div>
  </div>

  <div id="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo-orb">
          <div class="logo-orb-core">🌍</div>
        </div>
        <div>
          <h1>PROVA DE GEOGRAFIA</h1>
          <small>Levi Maciel · Revisão AV2 · África: Espaço, Economia e Desigualdades</small>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div id="progressFill"></div></div>
        <span id="progressLabel">Fase 0</span>
      </div>
    </header>

    <main id="screens"></main>

    <footer class="navbar">
      <button id="prevBtn" class="nav-btn">◀ Voltar</button>
      <span id="phaseTitle" class="phase-title"></span>
      <button id="nextBtn" class="nav-btn primary">Avançar ▶</button>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
